kind = "web"
previewPath = "/"
title = "Tallaght Community — Public Website"
version = "1.0.0"
id = "artifacts/community-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25604

[services.development]
run = "pnpm --filter @workspace/community-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/community-website", "run", "build" ]
publicDir = "artifacts/community-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25604"
BASE_PATH = "/"
