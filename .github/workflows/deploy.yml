name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kainitiative/whatsuptallaght

jobs:
  build-and-push:
    name: Build Docker image & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 185.43.233.219
          username: root
          password: ${{ secrets.VPS_SSH_PASS }}
          source: docker-compose.yml
          target: /opt/whatsuptallaght/

      - name: Pull new image & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 185.43.233.219
          username: root
          password: ${{ secrets.VPS_SSH_PASS }}
          script: |
            cd /opt/whatsuptallaght
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            for i in $(seq 1 12); do
              sleep 5
              if curl -sf http://localhost:8081/api/health > /dev/null; then
                echo "Health check passed"
                exit 0
              fi
              echo "Waiting... ($((i*5))s)"
            done
            echo "Health check failed after 60s"
            docker compose logs --tail=50
            exit 1
