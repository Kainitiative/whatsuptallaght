# What's Up Tallaght — Nginx server block
# Append this as an additional server{} block inside /etc/nginx/conf.d/default.conf on the VPS
# (The GroupWatch block is already in that file — just add this below it)

server {
    listen 80;
    server_name whatsuptallaght.ie www.whatsuptallaght.ie;
    # Certbot will insert the HTTPS redirect here once you run:
    #   certbot --nginx -d whatsuptallaght.ie -d www.whatsuptallaght.ie
    return 301 https://www.whatsuptallaght.ie$request_uri;
}

server {
    listen 443 ssl;
    server_name whatsuptallaght.ie www.whatsuptallaght.ie;

    # Certbot will populate these paths automatically:
    # ssl_certificate     /etc/letsencrypt/live/www.whatsuptallaght.ie/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/www.whatsuptallaght.ie/privkey.pem;

    location / {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;

        # WhatsApp images can be up to 15 MB
        client_max_body_size 15M;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
}
