# Nginx config for www.whatsuptallaght.ie
# Place this at /etc/nginx/sites-available/whatsuptallaght
# then: ln -s /etc/nginx/sites-available/whatsuptallaght /etc/nginx/sites-enabled/
# then: certbot --nginx -d whatsuptallaght.ie -d www.whatsuptallaght.ie

server {
    listen 80;
    server_name whatsuptallaght.ie www.whatsuptallaght.ie;
    # Certbot will add HTTPS redirect here automatically
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name whatsuptallaght.ie www.whatsuptallaght.ie;

    # Certbot manages these certificate paths
    # ssl_certificate     /etc/letsencrypt/live/www.whatsuptallaght.ie/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/www.whatsuptallaght.ie/privkey.pem;

    # Proxy everything to the Docker container
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Pass real client info to Express
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket support (for future use)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Generous timeouts for AI pipeline calls
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;

        # Upload size — WhatsApp images can be up to 10 MB
        client_max_body_size 15M;
    }

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
}
