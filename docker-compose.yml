services:
  app:
    image: ghcr.io/kainitiative/whatsuptallaght:latest
    restart: unless-stopped
    ports:
      # Bound to localhost only — Nginx proxies from port 80/443
      - "127.0.0.1:8081:8081"
    env_file:
      - .env.production
    volumes:
      # Persist uploaded images across container restarts
      - uploads:/data/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8081/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  uploads:
